# Render Blueprint — One-click deploy for KrishiSaarthi
# https://render.com/docs/blueprint-spec

databases:
  - name: krishisaarthi-db
    databaseName: krishisaarthi
    user: krishiuser
    plan: free
    region: singapore

services:
  # ── Backend (Django API) ──
  - type: web
    name: krishisaarthi-backend
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 120 KrishiSaarthi.wsgi:application"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: krishisaarthi-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        sync: false # Set after frontend deploys
      - key: CSRF_TRUSTED_ORIGINS
        sync: false # Set after frontend deploys
      - key: GEMINI_API_KEY
        sync: false # User sets this manually
      - key: OPENWEATHER_API_KEY
        sync: false # User sets this manually
      - key: GEE_PROJECT
        sync: false # Optional

  # ── Frontend (React Static Site) ──
  - type: web
    name: krishisaarthi-frontend
    runtime: static
    region: singapore
    plan: free
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist/public
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false # Set to backend URL after deploy
