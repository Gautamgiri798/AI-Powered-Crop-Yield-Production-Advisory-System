version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: krishisaarthi-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DEBUG=False
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - CORS_ALLOWED_ORIGINS=http://localhost,http://localhost:80
      - CSRF_TRUSTED_ORIGINS=http://localhost,http://localhost:80
    volumes:
      - backend_media:/app/media
      - backend_logs:/app/logs
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - krishisaarthi-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
    container_name: krishisaarthi-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - krishisaarthi-network

  db:
    image: postgres:15-alpine
    container_name: krishisaarthi-db
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-krishisaarthi}
      - POSTGRES_USER=${POSTGRES_USER:-krishiuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - krishisaarthi-network

volumes:
  postgres_data:
  backend_media:
  backend_logs:

networks:
  krishisaarthi-network:
    driver: bridge
